<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💛</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #a8edea, #fed6e3);
  overflow: hidden;
  color: #333;
  text-align: center;
}

/* Center content */
.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* Typing text */
#text {
  font-size: 26px;
  max-width: 600px;
  margin: auto;
  min-height: 80px;
}

/* Button */
button {
  padding: 12px 25px;
  margin: 15px;
  border: none;
  border-radius: 30px;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

#yes {
  background: #00c853;
  color: white;
}

#no {
  background: #ff5252;
  color: white;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: rgba(255,255,255,0.6);
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

img {
  max-width: 250px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">
  <div id="text"></div>
  <div id="buttons" style="display:none;">
    <h2>Will you be my best friend? 💛</h2>
    <button id="yes">YES</button>
    <button id="no">NO</button>
    <div id="fun"></div>
  </div>
</div>

<script>
let messages = [
  "Hey... just a small thing for you 💛",
  "Take your medicines on time 💊",
  "Eat properly, okay? 🍲",
  "And please take care of yourself...",
  "You matter more than you think 🌙"
];

let i = 0;
let j = 0;
let currentText = "";
let isDeleting = false;

function typeEffect() {
  if (i < messages.length) {
    if (!isDeleting && j <= messages[i].length) {
      currentText = messages[i].substring(0, j++);
    } else if (isDeleting && j >= 0) {
      currentText = messages[i].substring(0, j--);
    }

    document.getElementById("text").innerText = currentText;

    if (j === messages[i].length + 1) {
      isDeleting = true;
      setTimeout(typeEffect, 1000);
      return;
    }

    if (j === 0 && isDeleting) {
      isDeleting = false;
      i++;
    }

    setTimeout(typeEffect, isDeleting ? 40 : 70);
  } else {
    document.getElementById("buttons").style.display = "block";
  }
}

typeEffect();

// Hearts animation
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 300);

// Buttons logic
let yes = document.getElementById("yes");
let no = document.getElementById("no");
let fun = document.getElementById("fun");

no.onclick = () => {
  fun.innerHTML = "<p>😄 choose again!</p><img src='funny.png'>";
  yes.style.transform = "scale(1.6)";
  no.style.transform = "scale(0.6)";
};

yes.onclick = () => {
  fun.innerHTML = "<h2>Yay 💖</h2>";
};
</script>

</body>
</html>
